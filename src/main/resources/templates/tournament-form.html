<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ArenaRank | Torneio</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<aside class="sidebar">
    <div class="brand">
        <span class="brand-icon">AR</span>
        <div>
            <h1>ArenaRank</h1>
            <p>Competitive Manager</p>
        </div>
    </div>

    <nav class="menu">
        <a href="/">Dashboard</a>
        <a href="/players">Jogadores</a>
        <a href="/teams">Times</a>
        <a class="active" href="/tournaments">Torneios</a>
        <a href="#">Ranking</a>
    </nav>
</aside>

<main class="content">
    <header class="topbar">
        <div>
            <h2 th:text="${formTitle}">Novo torneio</h2>
            <p>Preencha os dados da competição.</p>
        </div>

        <a class="btn-secondary" href="/tournaments">Voltar</a>
    </header>

    <section class="form-card">
        <form th:action="@{${formAction}}" th:object="${tournament}" method="post">
            <div class="form-group">
                <label for="name">Nome do torneio</label>
                <input id="name" type="text" th:field="*{name}" placeholder="Ex: Copa EnvWrd">
                <small th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></small>
            </div>

            <div class="form-group">
                <label for="startDate">Data de início</label>
                <input id="startDate" type="date" th:field="*{startDate}">
                <small th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></small>
            </div>

            <div class="form-group">
                <label for="endDate">Data de término</label>
                <input id="endDate" type="date" th:field="*{endDate}">
                <small th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></small>
            </div>

            <button class="btn-primary" type="submit">Salvar torneio</button>
        </form>
    </section>
</main>

</body>
</html>
